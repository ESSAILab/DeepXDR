<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Access Blocked</title>
  <style>
    /* reset */
    html, body {
      margin: 0;
      padding: 0;
    }

    /* 贴顶样式 */
    body {
      background: #f2f2f2;
      font-family: Arial, Helvetica, sans-serif;
      padding-top: 20px; /* 距离顶部的距离 */
    }

    .box {
      max-width: 600px;
      margin: 0 auto; /* 水平居中 */
      background: #fff;
      padding: 40px 30px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 26px;
      color: #d63031;
      margin: 0 0 15px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Access Blocked</h1>
    <p>Possible attack behavior detected.<br>
       Your IP has been blocked. Please wait about 2 minutes and try again later.</p>
  </div>
</body>
</html>
