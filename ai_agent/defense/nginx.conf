
#user  nobody;
worker_processes  1;

error_log  logs/error.log debug;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;
    
    limit_req_zone $binary_remote_addr zone=one:10m rate=5r/s;

    # 必须有 zone
    upstream dotcms_backend {
        zone dotcms 8m;
        server 172.18.8.106:8080;
    }

    geo $blocked {
	    default 0;
	    include /etc/nginx/blocked_ips.conf;
    }

    server {
        listen       80;
        server_name  localhost;

	error_page 403 /custom_403.html;
	location =  /custom_403.html {
		root /usr/share/nginx/html;
		internal;
	}


        #charset koi8-r;

        #access_log  logs/host.access.log  main;

        # 动态 upstream 接口
        location /dynamic {
            allow 127.0.0.1;
            allow 172.18.8.0/24;  # 你的管理网络
            deny all;
            dynamic_upstream;
        }

	location / {
	    if ($blocked) {
		    return 403;
	    }

	    # 最多放行 6 个请求（1 正常 + 5 突发）之后每秒放行 1 个（令牌桶每秒补充 1 个）
            limit_req zone=one burst=5 nodelay;


            proxy_pass http://dotcms_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Buffer client request bodies before proxying so slow uploads do not
            # hold backend connections open.
            proxy_request_buffering on;
            proxy_buffering on;
            # Keep upstream timeouts bounded to limit long-lived idle connections.
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            # Reject unexpectedly large request bodies at nginx before proxying.
            client_max_body_size 20m;
            client_body_timeout 30s;
        }

        # 禁止访问 /dotAdmin/ 开头的路径
        location /dotAdmin/ {
            return 403 "Access to /dotAdmin/ is forbidden.";
            # 或者返回 444 断开连接（更彻底）
            # return 444;
        }

        # proxy the PHP scripts to Apache listening on 127.0.0.1:80
        #
        #location ~ \.php$ {
        #    proxy_pass   http://127.0.0.1;
        #}

        # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
        #
        #location ~ \.php$ {
        #    root           html;
        #    fastcgi_pass   127.0.0.1:9000;
        #    fastcgi_index  index.php;
        #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
        #    include        fastcgi_params;
        #}

        # deny access to .htaccess files, if Apache's document root
        # concurs with nginx's one
        #
        #location ~ /\.ht {
        #    deny  all;
        #}
    }


    # another virtual host using mix of IP-, name-, and port-based configuration
