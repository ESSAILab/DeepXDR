input {
  beats {
    port => 5044
  }
}

filter {
  # --- 1. 生成唯一 ID ---
  uuid {
    target => "event_id"
  }

  # --- 2. 核心逻辑：解析不同字段的时间，并统一覆盖为北京时间 ---

  if [fields][log_source] == "openrasp" {
    mutate { add_field => { "type" => "openrasp" } }
    
    # 解析 event_time (UTC 格式)
    date {
      match => [ "event_time", "ISO8601" ]
      target => "event_time"
    }
    # 转换为北京时间字符串覆盖原字段
    ruby {
      code => "if event.get('event_time'); event.set('event_time', event.get('event_time').time.getlocal('+08:00').strftime('%Y-%m-%dT%H:%M:%S%z')); end"
    }
  } 

  else if [fields][log_source] == "falco" {
    mutate { add_field => { "type" => "falco" } }
    
    # 解析 time (UTC 格式)
    date {
      match => [ "time", "ISO8601" ]
      target => "time"
    }
    # 转换为北京时间字符串覆盖原字段 (保留毫秒)
    ruby {
      code => "if event.get('time'); event.set('time', event.get('time').time.getlocal('+08:00').strftime('%Y-%m-%dT%H:%M:%S.%3N%z')); end"
    }
  } 

  else if [fields][log_source] == "suricata" {
    # 只保留 alert 类型的 Suricata 日志
    if [event_type] != "alert" {
      drop {}
    }
    mutate { add_field => { "type" => "suricata" } }
    
    # 解析 timestamp (-0500 格式)
    # date 插件会自动识别 -0500 并将其转为标准时间
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "timestamp"
    }
    # 转换为北京时间字符串覆盖原字段 (保留微秒级别精度)
    ruby {
      code => "if event.get('timestamp'); event.set('timestamp', event.get('timestamp').time.getlocal('+08:00').strftime('%Y-%m-%dT%H:%M:%S.%6N%z')); end"
    }
  }

  # --- 3. 统一全局 @timestamp (用于 ES 索引排序) ---
  # 将处理好的北京时间字符串赋值给 @timestamp
  if [type] == "openrasp" {
     mutate { copy => { "event_time" => "@timestamp" } }
  } else if [type] == "falco" {
     mutate { copy => { "time" => "@timestamp" } }
  } else if [type] == "suricata" {
     mutate { copy => { "timestamp" => "@timestamp" } }
  }

  # --- 4. 清理多余字段 ---
  mutate {
    remove_field => [ "event", "log", "host", "@version", "agent", "ecs", "input", "fields" ]
  }
}

output {
  if [type] == "openrasp" {
    elasticsearch {
      hosts => ["http://es-log:9200"]
      index => "openrasp-alerts-%{+YYYY.MM.dd}"
    }
  } else if [type] == "falco" {
    elasticsearch {
      hosts => ["http://es-log:9200"]
      index => "falco-alerts-%{+YYYY.MM.dd}"
    }
  } else if [type] == "suricata" {
    elasticsearch {
      hosts => ["http://es-log:9200"]
      index => "suricata-alerts-%{+YYYY.MM.dd}"
    }
  }

  # 输出到Kafka
  kafka {
    bootstrap_servers => "<defense-ip>:29092"
    topic_id => "events"
    codec => "json"
    
    # 建议添加以下配置：
    message_key => "%{event_id}"      # 将唯一ID作为消息Key
    acks => "1"                       # 只要 Leader 接收到就确认，平衡性能与安全
    # --- 实时性优化配置 ---
    batch_size => 1       # 将批次大小设为 1，只要有数据就发往 Kafka
    linger_ms => 0        # 强制立即发送，不进行任何微小的等待
  }

  # 保持控制台输出，方便观察实时流量
  stdout { codec => rubydebug }
}
